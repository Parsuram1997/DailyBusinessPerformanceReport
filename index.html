<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>BizPerform - Login</title>
    <!-- Keep auth.js at the very top to redirect immediately if already logged in -->
    <script src="auth.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7f13ec",
                        "background-light": "#f7f6f8",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
    <link rel="icon" type="image/png" href="favicon.png"/>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center relative overflow-hidden">
    
    <!-- Background Decor -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 blur-3xl opacity-30">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob"></div>
        <div class="absolute top-[20%] right-[-10%] w-[50%] h-[50%] bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
        <div class="absolute bottom-[-20%] left-[20%] w-[60%] h-[60%] bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-blob animation-delay-4000"></div>
    </div>

    <!-- Login Card -->
    <div class="w-full max-w-md bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border border-white/20 dark:border-slate-800 p-8 rounded-3xl shadow-2xl relative">
        <div class="text-center space-y-2 mb-8">
            <div class="size-16 rounded-2xl bg-gradient-to-br from-primary to-blue-600 flex items-center justify-center text-white mx-auto shadow-lg shadow-primary/30 mb-6 group hover:scale-105 transition-transform">
                <span class="material-symbols-outlined text-3xl">analytics</span>
            </div>
            <h1 class="text-2xl font-black tracking-tight">Welcome to BizPerform</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm">Sign in to manage your daily backend reports and assets effectively.</p>
        </div>

        <form id="login-form" class="space-y-5">
            <div id="login-error" class="hidden bg-rose-50 text-rose-600 px-4 py-3 rounded-xl border border-rose-100 flex items-center gap-3 text-sm font-medium">
                <span class="material-symbols-outlined">error</span>
                Invalid username or password.
            </div>

            <div class="space-y-1">
                <label for="username" class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-1">Username</label>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400 group-focus-within:text-primary transition-colors">
                        <span class="material-symbols-outlined text-lg">person</span>
                    </span>
                    <input type="text" id="username" placeholder="Enter username" required class="w-full bg-slate-50 dark:bg-slate-950/50 border border-slate-200 dark:border-slate-800 rounded-xl pl-11 pr-4 py-3 text-sm font-semibold focus:ring-2 focus:ring-primary focus:border-primary transition-all shadow-sm outline-none" autocomplete="username">
                </div>
            </div>

            <div class="space-y-1">
                <label for="password" class="text-xs font-bold text-slate-500 uppercase tracking-widest pl-1">Password</label>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400 group-focus-within:text-primary transition-colors">
                        <span class="material-symbols-outlined text-lg">lock</span>
                    </span>
                    <input type="password" id="password" placeholder="Enter password" required class="w-full bg-slate-50 dark:bg-slate-950/50 border border-slate-200 dark:border-slate-800 rounded-xl pl-11 pr-4 py-3 text-sm focus:ring-2 focus:ring-primary focus:border-primary transition-all shadow-sm outline-none" autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="w-full bg-primary hover:bg-primary/90 text-white font-bold rounded-xl py-3.5 shadow-lg shadow-primary/25 hover:shadow-primary/40 hover:-translate-y-0.5 transition-all text-sm mt-2 flex items-center justify-center gap-2">
                <span>Sign In</span>
                <span class="material-symbols-outlined text-lg">login</span>
            </button>
        </form>
    </div>

    <!-- Small footer element -->
    <p class="absolute bottom-6 text-xs text-slate-500 dark:text-slate-400 font-medium tracking-wide">
        &copy; 2026 Parsuram Naik. All rights reserved.
    </p>

</body>
</html>
