<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Img to PDF Pro - Flexible Print Generator</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#4f46e5",
                        "success": "#10b981",
                        "surface": "#ffffff",
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; color: #111827; }
        .material-symbols-outlined { 
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; 
        }
        .step-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
        .animate-card { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .toggle-btn.active { background-color: #4f46e5; color: white; border-color: #4f46e5; }
        .toggle-btn { background-color: #f8fafc; color: #64748b; border: 2px solid #e2e8f0; transition: all 0.2s; }
    </style>
</head>
<body class="min-h-screen pb-40">
    
    <div class="max-w-5xl mx-auto px-6 py-10">
        
        <!-- Header -->
        <header class="flex items-center justify-between mb-10 border-b-2 border-slate-200 pb-8">
            <div class="flex items-center gap-5">
                <a href="index.html" class="bg-slate-900 border-2 border-slate-900 size-12 rounded-xl flex items-center justify-center hover:bg-slate-800 transition-colors shadow-lg shadow-black/10 text-white group">
                    <span class="material-symbols-outlined text-2xl font-bold">arrow_back</span>
                </a>
                <div>
                    <h1 class="text-3xl font-black tracking-tighter uppercase leading-none">Img to PDF Pro</h1>
                    <p class="text-slate-500 font-bold text-xs mt-1">Multi-Size & Orientation Generator</p>
                </div>
            </div>
        </header>

        <!-- Dynamic Content -->
        <div id="doc-blocks-container" class="space-y-12">
            <!-- Cards injected here -->
        </div>

    </div>

    <!-- Permanent Bottom Bar -->
    <div class="fixed bottom-0 left-0 right-0 p-4 md:p-6 bg-white border-t-2 border-slate-200 z-50 flex justify-center">
        <div class="w-full max-w-2xl flex items-center gap-3 md:gap-4">
            <button onclick="addDocumentBlock()" class="bg-indigo-100 text-indigo-600 p-4 md:px-6 md:py-4 rounded-2xl hover:bg-indigo-200 transition-all font-black text-xs uppercase flex items-center gap-2 flex-shrink-0 shadow-sm" title="Add New Page">
                <span class="material-symbols-outlined text-2xl font-bold">add</span>
                <span class="hidden md:inline">Add Page</span>
            </button>
            <button onclick="clearAllBlocks()" class="bg-rose-100 text-rose-600 p-4 md:px-6 md:py-4 rounded-2xl hover:bg-rose-200 transition-all font-black text-xs uppercase flex items-center gap-2 flex-shrink-0 shadow-sm" title="Clear All">
                <span class="material-symbols-outlined text-2xl font-bold">delete_sweep</span>
                <span class="hidden md:inline">Clear All</span>
            </button>
            <button onclick="generatePDF()" id="btn-generate" class="flex-1 bg-primary text-white p-4 md:py-5 rounded-2xl font-black md:text-lg uppercase tracking-[1px] md:tracking-[3px] shadow-2xl shadow-primary/30 hover:shadow-primary/50 transition-all flex items-center justify-center gap-3">
                <span class="material-symbols-outlined text-2xl md:text-3xl font-bold">print</span>
                <span class="hidden md:inline">Generate & Print PDF</span>
            </button>
        </div>
    </div>

    <script>
        let docBlocks = [];
        const container = document.getElementById('doc-blocks-container');

        function addDocumentBlock() {
            const id = Date.now();
            docBlocks.push({ 
                id, 
                front: null, 
                back: null, 
                size: 'id', // 'id', 'half', 'full'
                orientation: 'p' // 'p' for portrait, 'l' for landscape
            });
            renderBlocks();
        }

        function removeBlock(id) {
            if (docBlocks.length <= 1) {
                clearAllBlocks();
                return;
            }
            docBlocks = docBlocks.filter(b => b.id !== id);
            renderBlocks();
        }

        function clearAllBlocks() {
            docBlocks = [];
            addDocumentBlock();
        }

        function updateBlockOption(id, key, value) {
            const block = docBlocks.find(b => b.id === id);
            if (block) {
                block[key] = value;
                renderBlocks();
            }
        }

        function handleFileUpload(id, side, file) {
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) {
                alert("File is too big. Max 2MB allowed.");
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                const block = docBlocks.find(b => b.id === id);
                if (block) {
                    block[side] = e.target.result;
                    renderBlocks();
                }
            };
            reader.readAsDataURL(file);
        }

        function renderBlocks() {
            container.innerHTML = docBlocks.map((block, index) => `
                <div class="animate-card bg-white border-2 border-slate-200 rounded-3xl p-6 md:p-8 step-shadow relative">
                    <!-- Card Header -->
                    <div class="flex items-center justify-between mb-8 pb-6 border-b-2 border-slate-100">
                        <div class="flex items-center gap-4">
                            <div class="bg-primary text-white size-10 rounded-xl flex items-center justify-center font-black text-lg shadow-md">#${index + 1}</div>
                            <h3 class="text-xl font-black text-slate-800 uppercase tracking-tight">Document Slot</h3>
                        </div>
                        <button onclick="removeBlock(${block.id})" class="flex items-center gap-1 text-rose-600 font-black text-[10px] uppercase bg-rose-50 px-3 py-2 rounded-xl hover:bg-rose-100 transition-colors">
                            <span class="material-symbols-outlined text-xl font-bold">cancel</span>
                            Remove
                        </button>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                        <!-- Left: Settings -->
                        <div class="lg:col-span-4 space-y-8 bg-slate-50 p-6 rounded-2xl border border-slate-100">
                            <h4 class="text-xs font-black text-slate-500 uppercase tracking-widest border-b border-slate-200 pb-3">Print Settings</h4>
                            
                            <!-- Size Options -->
                            <div class="space-y-3">
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block">Output Size</label>
                                <div class="flex flex-col gap-2">
                                    <button onclick="updateBlockOption(${block.id}, 'size', 'id')" class="toggle-btn px-4 py-3 rounded-xl text-left font-black text-xs flex items-center gap-3 ${block.size === 'id' ? 'active' : ''}">
                                        <span class="material-symbols-outlined text-lg">${block.size === 'id' ? 'radio_button_checked' : 'radio_button_unchecked'}</span>
                                        Standard ID (85.6mm)
                                    </button>
                                    <button onclick="updateBlockOption(${block.id}, 'size', 'half')" class="toggle-btn px-4 py-3 rounded-xl text-left font-black text-xs flex items-center gap-3 ${block.size === 'half' ? 'active' : ''}">
                                        <span class="material-symbols-outlined text-lg">${block.size === 'half' ? 'radio_button_checked' : 'radio_button_unchecked'}</span>
                                        Half Page (A4/2)
                                    </button>
                                    <button onclick="updateBlockOption(${block.id}, 'size', 'full')" class="toggle-btn px-4 py-3 rounded-xl text-left font-black text-xs flex items-center gap-3 ${block.size === 'full' ? 'active' : ''}">
                                        <span class="material-symbols-outlined text-lg">${block.size === 'full' ? 'radio_button_checked' : 'radio_button_unchecked'}</span>
                                        Full Page (A4 Full)
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Right: Uploads -->
                        <div class="lg:col-span-8 grid ${block.size === 'id' ? 'grid-cols-1 md:grid-cols-2' : 'grid-cols-1'} gap-8">
                            <!-- FRONT -->
                            <div class="space-y-4">
                                <div class="flex items-center justify-between">
                                    <span class="bg-indigo-950 text-white px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest">${block.size === 'id' ? 'FRONT SIDE' : 'SINGLE DOCUMENT'}</span>
                                    ${block.front ? '<span class="text-[10px] font-black text-emerald-600 flex items-center gap-1"><span class="material-symbols-outlined text-sm">check_circle</span> READY</span>' : ''}
                                </div>
                                <label class="cursor-pointer block relative">
                                    <input type="file" accept="image/png, image/jpeg" class="hidden" onchange="handleFileUpload(${block.id}, 'front', this.files[0])">
                                    <div class="${block.size === 'id' ? 'aspect-[1.58/1]' : (block.orientation === 'p' ? 'aspect-[1/1.41]' : 'aspect-[1.41/1]')} rounded-2xl border-4 ${block.front ? 'border-success' : 'border-slate-300'} bg-white flex flex-col items-center justify-center overflow-hidden transition-all hover:border-primary">
                                        ${block.front ? `
                                            <img src="${block.front}" class="w-full h-full object-cover">
                                            <div class="absolute inset-0 bg-slate-900/40 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity">
                                                <div class="bg-white text-slate-900 px-4 py-2 rounded-lg font-black text-[10px] shadow-xl uppercase">Update Photo</div>
                                            </div>
                                        ` : `
                                            <div class="text-center">
                                                <span class="material-symbols-outlined text-4xl text-slate-400 mb-2 block">add_a_photo</span>
                                                <p class="text-[10px] font-black text-slate-500 uppercase">${block.size === 'id' ? 'Upload Front Side' : 'Upload Document'}</p>
                                            </div>
                                        `}
                                    </div>
                                </label>
                            </div>

                            <!-- BACK (Only for ID Card) -->
                            ${block.size === 'id' ? `
                            <div class="space-y-4">
                                <div class="flex items-center justify-between">
                                    <span class="bg-slate-400 text-white px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest italic">BACK SIDE</span>
                                    ${block.back ? '<span class="text-[10px] font-black text-emerald-600 flex items-center gap-1"><span class="material-symbols-outlined text-sm">check_circle</span> READY</span>' : ''}
                                </div>
                                <label class="cursor-pointer block relative">
                                    <input type="file" accept="image/png, image/jpeg" class="hidden" onchange="handleFileUpload(${block.id}, 'back', this.files[0])">
                                    <div class="aspect-[1.58/1] rounded-2xl border-4 ${block.back ? 'border-success' : 'border-slate-300'} bg-white flex flex-col items-center justify-center overflow-hidden transition-all hover:border-primary">
                                        ${block.back ? `
                                            <img src="${block.back}" class="w-full h-full object-cover">
                                            <div class="absolute inset-0 bg-slate-900/40 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity">
                                                <div class="bg-white text-slate-900 px-4 py-2 rounded-lg font-black text-[10px] shadow-xl uppercase">Update Photo</div>
                                            </div>
                                        ` : `
                                            <div class="text-center">
                                                <span class="material-symbols-outlined text-4xl text-slate-400 mb-2 block">add_a_photo</span>
                                                <p class="text-[10px] font-black text-slate-500 uppercase">Upload Back Side</p>
                                            </div>
                                        `}
                                    </div>
                                </label>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function generatePDF() {
            const btn = document.getElementById('btn-generate');
            const originalText = btn.innerHTML;
            
            if (docBlocks.some(b => !b.front)) {
                alert("Please upload at least the 'Front' image for all documents.");
                return;
            }

            try {
                if (!window.jspdf) throw new Error("PDF Library failed to load. Please refresh.");
                btn.disabled = true;
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin shadow-none">sync</span> Creating Optimized PDF...';

                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const a4W = 210;
                const a4H = 297;

                for (let i = 0; i < docBlocks.length; i++) {
                    const block = docBlocks[i];
                    if (i > 0) pdf.addPage(block.orientation, 'a4');
                    else {
                        // First page orientation update if needed
                        if (block.orientation === 'l') pdf.deletePage(1);
                        if (block.orientation === 'l') pdf.addPage('l', 'a4');
                    }

                    // Reset context values based on orientation
                    const pageW = block.orientation === 'p' ? a4W : a4H;
                    const pageH = block.orientation === 'p' ? a4H : a4W;

                    const processedImg = await processDoc(block);
                    const imgProps = pdf.getImageProperties(processedImg);
                    
                    let drawW, drawH, x, y;

                    if (block.size === 'id') {
                        drawW = 85.6; // Standard ID width
                        drawH = (imgProps.height * drawW) / imgProps.width;
                        x = (pageW - drawW) / 2;
                        y = 20; // Top Aligned
                    } else if (block.size === 'half') {
                        drawW = pageW - 40; // Full width with margins
                        drawH = (imgProps.height * drawW) / imgProps.width;
                        // Limit height to half page
                        if (drawH > (pageH / 2) - 20) {
                            drawH = (pageH / 2) - 20;
                            drawW = (imgProps.width * drawH) / imgProps.height;
                        }
                        x = (pageW - drawW) / 2;
                        y = 10;
                    } else { // Full Page
                        drawW = pageW - 20;
                        drawH = (imgProps.height * drawW) / imgProps.width;
                        if (drawH > pageH - 20) {
                            drawH = pageH - 20;
                            drawW = (imgProps.width * drawH) / imgProps.height;
                        }
                        x = (pageW - drawW) / 2;
                        y = 10;
                    }

                    pdf.addImage(processedImg, 'JPEG', x, y, drawW, drawH);
                }

                pdf.autoPrint();
                const blobUrl = pdf.output('bloburl');
                const win = window.open(blobUrl, '_blank');
                if (!win) {
                    pdf.save("document_printout.pdf");
                    alert("Popup blocked! PDF has been downloaded instead.");
                }
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        function processDoc(block) {
            return new Promise((resolve) => {
                const ratio = 1.586; // Precise ID ratio
                const gap = 15;
                const normalize = (src) => {
                    return new Promise(res => {
                        const img = new Image();
                        img.onload = () => {
                            const c = document.createElement('canvas');
                            let w, h;
                            // Only crop for ID standard size
                            if (block.size === 'id') {
                                w = img.width; h = img.width / ratio;
                                c.width = w; c.height = h;
                                const ctx = c.getContext('2d');
                                ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0,0,w,h);
                                const ir = img.width / img.height;
                                let dw, dh, ow, oh;
                                if (ir > ratio) {
                                    dh = h; dw = h * ir; ow = (w - dw) / 2; oh = 0;
                                } else {
                                    dw = w; dh = w / ir; ow = 0; oh = (h - dh) / 2;
                                }
                                ctx.drawImage(img, ow, oh, dw, dh);
                            } else {
                                // For half/full page, use original image aspect ratio
                                c.width = img.width; 
                                c.height = img.height;
                                const ctx = c.getContext('2d');
                                ctx.drawImage(img, 0, 0);
                            }
                            res(c);
                        };
                        img.src = src;
                    });
                };
                const exec = async () => {
                    const fc = await normalize(block.front);
                    if (!block.back) {
                        resolve(fc.toDataURL('image/jpeg', 0.9));
                    } else {
                        const bc = await normalize(block.back);
                        const mc = document.createElement('canvas');
                        mc.width = fc.width;
                        mc.height = fc.height + bc.height + gap;
                        const mctx = mc.getContext('2d');
                        mctx.fillStyle = "#FFFFFF"; mctx.fillRect(0,0,mc.width, mc.height);
                        mctx.drawImage(fc, 0, 0);
                        mctx.drawImage(bc, 0, fc.height + gap);
                        resolve(mc.toDataURL('image/jpeg', 0.9));
                    }
                };
                exec();
            });
        }

        addDocumentBlock();
    </script>
</body>
</html>
